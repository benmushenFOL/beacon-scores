<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Beacon of Light — Tournament Display</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root{
    --bg:#152548;
    --bg2:#1b2e57;
    --card:#1f3460;
    --line:rgba(255,255,255,0.12);
    --ink:#ffffff;
    --ink2:#aeb9d6;
    --ink3:#7d8cb4;
    --accent:#ff2bbf;
    --accent2:#75ff00;
    --purple:#7b3ff2;
    --live:#75ff00;
    --font:'DIN','DIN Next',Oswald,'Segoe UI Condensed','Arial Narrow',system-ui,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:var(--font);
    overflow:hidden;
    width:100vw;height:100vh;
  }
  .wrap{height:100%;display:flex;flex-direction:column;}

  header{
    display:flex;align-items:center;justify-content:space-between;
    padding:2.2vh 2.4vw;border-bottom:1px solid var(--line);
    flex:0 0 auto;
  }
  .brand{display:flex;align-items:center;gap:1.2vw;}
  .brand .logo{
    height:7vh;min-height:64px;width:auto;display:block;
  }
  .brand .titles{border-left:2px solid var(--accent);padding-left:1.1vw;}
  .brand h1{font-size:1.7vw;font-weight:700;letter-spacing:-0.01em;}
  .brand p{font-size:1.0vw;color:var(--ink2);font-weight:500;}
  .live-pill{
    display:flex;align-items:center;gap:0.6vw;font-size:1.0vw;
    color:var(--ink2);font-weight:600;text-transform:uppercase;letter-spacing:0.1em;
  }

  .dot{width:0.8vw;height:0.8vw;min-width:10px;min-height:10px;border-radius:50%;background:var(--live);
    animation:pulse 1.8s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}

  main{flex:1 1 auto;padding:2.4vh 2.4vw;overflow:hidden;display:flex;flex-direction:column;}

  /* ---- TV: courts (left) + league table (right) ---- */
  .tvsplit{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1.6vw;flex:1 1 auto;min-height:0;}
  .tvcol{display:flex;flex-direction:column;min-height:0;}
  .tvcol h2{font-size:1.1vw;text-transform:uppercase;letter-spacing:0.12em;color:var(--accent);
    font-weight:700;margin-bottom:1.4vh;flex:0 0 auto;}

  /* courts stacked vertically on the left */
  .courts{display:flex;flex-direction:column;gap:1.4vh;flex:1 1 auto;min-height:0;}
  .court{
    background:var(--card);border:1px solid var(--line);border-radius:1vw;
    padding:1.4vh 1.6vw;display:flex;flex-direction:column;justify-content:center;flex:1 1 0;min-height:0;
  }
  .court .label{
    font-size:0.9vw;text-transform:uppercase;letter-spacing:0.14em;
    color:var(--accent);font-weight:700;margin-bottom:0.8vh;
  }
  .team-row{display:flex;align-items:baseline;justify-content:space-between;padding:0.5vh 0;}
  .team-row .name{font-size:1.5vw;font-weight:600;}
  .team-row.batting .name{color:var(--accent);}
  .team-row .score{font-size:2vw;font-weight:800;letter-spacing:-0.02em;font-variant-numeric:tabular-nums;}
  .team-row .overs{font-size:0.9vw;color:var(--ink2);font-weight:500;margin-left:0.4vw;}
  .team-row .ytb{font-size:0.95vw;color:var(--ink3);font-style:italic;font-weight:500;}
  .vs{font-size:0.85vw;color:var(--ink3);text-align:center;padding:0.3vh 0;font-weight:600;}

  /* full league table on the right */
  .ltable{width:100%;border-collapse:collapse;flex:1 1 auto;}
  .ltable th{font-size:1.1vw;text-transform:uppercase;letter-spacing:0.06em;color:var(--accent);
    font-weight:700;text-align:center;padding:0.6vh 0.3vw;}
  .ltable th.team{text-align:left;}
  .ltable td{font-size:1.25vw;font-weight:600;text-align:center;padding:0.55vh 0.3vw;
    border-top:1px solid var(--line);font-variant-numeric:tabular-nums;color:var(--ink);}
  .ltable td.pos{color:var(--ink3);font-weight:800;width:7%;}
  .ltable td.team{text-align:left;font-weight:700;}
  .ltable td.pts{color:var(--accent);font-weight:800;}
  .ltable tr.qual td.pos{color:var(--accent2);}
  .ltable tr:not(.qual) td{color:var(--ink2);}
  .ltable tr.qual td.team::after{content:" ●";color:var(--accent2);font-size:0.85vw;vertical-align:middle;margin-left:0.4vw;}

  /* stacked group tables */
  .grouptables{display:flex;flex-direction:column;gap:1.4vh;flex:1 1 auto;min-height:0;}
  .grouptable h3{font-size:1.0vw;text-transform:uppercase;letter-spacing:0.1em;color:var(--accent);
    font-weight:700;margin-bottom:0.6vh;}
  .grouptable table{width:100%;border-collapse:collapse;}

  /* fixtures & results middle column (auto-scrolling, time-grouped) */
  .fxviewport{flex:1 1 auto;min-height:0;overflow:hidden;position:relative;}
  .fxscroll{display:flex;flex-direction:column;gap:0.6vh;position:absolute;left:0;right:0;top:0;}
  .fxhdr{font-size:0.85vw;text-transform:uppercase;letter-spacing:0.08em;color:var(--accent);
    font-weight:700;padding:0.6vh 0 0.2vh;display:flex;align-items:center;gap:0.6vw;}
  .fxhdr .gp{color:var(--ink3);font-weight:600;}
  .fx{background:var(--card);border:1px solid var(--line);border-radius:0.6vw;padding:0.7vh 0.9vw;
    display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:0.6vw;}
  .fx.upcoming{opacity:0.72;}
  .fx .side{display:flex;flex-direction:column;min-width:0;}
  .fx .side.right{text-align:right;align-items:flex-end;}
  .fx .side .nm{font-weight:600;font-size:1.0vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%;}
  .fx .side.win .nm{color:var(--accent2);font-weight:800;}
  .fx .side .sc{font-weight:800;font-size:1.15vw;font-variant-numeric:tabular-nums;margin-top:0.2vh;}
  .fx .vsep{font-size:0.72vw;color:var(--ink3);font-weight:700;letter-spacing:0.05em;flex:0 0 auto;}

  /* ---- TOTEM: leaderboard ---- */
  .totem main{padding:2vh 4vw 4vh;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-start;}
  .totem .board-wrap{flex:0 0 auto;}
  .grouptables-totem{display:flex;flex-direction:column;gap:2.4vh;}
  .grouptables-totem .grouptable h3{font-size:1.8vw;text-transform:uppercase;letter-spacing:0.1em;
    color:var(--accent);font-weight:700;margin-bottom:1vh;}
  table.board{width:100%;border-collapse:collapse;}
  table.board th{font-size:1.4vw;text-transform:uppercase;letter-spacing:0.08em;
    color:var(--accent);font-weight:700;text-align:center;padding:0.8vh 0.4vw;}
  table.board th.team{text-align:left;}
  table.board td{font-size:1.7vw;font-weight:600;text-align:center;padding:0.75vh 0.4vw;
    border-top:1px solid var(--line);font-variant-numeric:tabular-nums;}
  table.board td.pos{color:var(--ink3);font-weight:800;width:8%;}
  table.board td.team{text-align:left;font-weight:700;}
  table.board td.pts{color:var(--accent);font-weight:800;}
  table.board tr td{color:var(--ink);}
  table.board td.pos{color:var(--ink3);font-weight:800;width:8%;}
  table.board tr.qual td.pos{color:var(--accent2);}
  table.board tr:not(.qual) td{color:var(--ink2);}
  table.board tr.qual td.team::after{content:" ●";color:var(--accent2);font-size:1.0vw;vertical-align:middle;margin-left:0.4vw;}

  .totem-live{margin-top:4vh;background:var(--card);border:1px solid var(--line);
    border-radius:1.2vw;padding:2.4vh 2vw;flex:0 0 auto;}
  .totem-live h2{font-size:1.7vw;text-transform:uppercase;letter-spacing:0.08em;
    color:var(--accent);font-weight:700;margin-bottom:2vh;}
  .tl-row{display:flex;justify-content:space-between;align-items:center;padding:1.6vh 0;
    border-bottom:1px solid var(--line);font-size:2vw;}
  .tl-row:last-child{border-bottom:none;}
  .tl-row .ct{color:var(--ink3);font-weight:700;font-size:1.4vw;width:18%;}
  .tl-row .mt{flex:1;font-weight:600;}
  .tl-row .sc{font-weight:800;color:var(--accent);font-variant-numeric:tabular-nums;}

  /* ---- knockout bracket ---- */
  .bracket{display:grid;grid-template-columns:repeat(4,1fr);gap:1.4vw;flex:1 1 auto;align-content:center;}
  .vbracket{display:flex;flex-direction:column;flex:1 1 auto;min-height:0;justify-content:space-between;
    align-items:center;padding:3vh 3vw;font-size:clamp(13px,2.6vw,34px);box-sizing:border-box;}
  .vround{display:flex;flex-direction:column;align-items:center;width:100%;}
  .vround h3{font-size:0.6em;text-transform:uppercase;letter-spacing:0.08em;color:var(--accent);
    font-weight:700;text-align:center;margin-bottom:0.8vh;}
  .vrow{display:flex;flex-direction:row;justify-content:center;gap:1.4vw;width:100%;max-width:94%;margin:0 auto;}
  .vrow > .tie{flex:1 1 0;min-width:0;}
  .vrow.one{max-width:70%;}
  .vbracket .tie .t{font-size:0.78em;padding:1vh 0.9vw;gap:0.5vw;line-height:1.15;}
  .vbracket .tie .t > span:first-child{min-width:0;word-break:break-word;}
  .vbracket .tie .t .s{flex:0 0 auto;font-weight:800;}
  /* narrow QF boxes: stack name over score so names never wrap mid-word */
  .qfrow .tie .t{flex-direction:column;align-items:flex-start;gap:0.1vh;font-size:0.66em;padding:0.9vh 0.7vw;}
  .qfrow .tie .t > span:first-child{white-space:normal;word-break:normal;line-height:1.1;}
  .qfrow .tie .t .s{align-self:flex-start;}
  .champcard{width:100%;text-align:center;background:var(--card);border:3px solid var(--accent);
    border-radius:1vw;padding:2.6vh 1vw;box-shadow:0 0 24px rgba(255,43,191,0.25);}
  .champcard .nm{font-size:1.3em;font-weight:800;}
  .champcard .nm.tbd{color:var(--ink3);font-weight:500;}
  .vconn{width:3px;height:3.5vh;background:var(--accent);opacity:0.55;margin:0;}
  .vfunnel{width:90%;max-width:90%;height:5vh;min-height:3vh;margin:0 auto;flex:0 1 auto;}
  .vfunnel svg{width:100%;height:100%;display:block;}
  #fsbtn{position:fixed;top:1vh;right:1vw;z-index:50;background:rgba(255,255,255,0.12);color:#fff;border:1px solid rgba(255,255,255,0.25);border-radius:6px;padding:6px 12px;font-size:13px;cursor:pointer;font-family:inherit;}
  #fsbtn:hover{background:rgba(255,255,255,0.22);}
  :fullscreen #fsbtn, body:fullscreen #fsbtn{display:none;}
  .bcol{display:flex;flex-direction:column;justify-content:space-around;gap:1.4vh;}
  .bcol h3{font-size:1.0vw;text-transform:uppercase;letter-spacing:0.12em;color:var(--accent);
    font-weight:700;text-align:center;margin-bottom:1.0vh;}
  .tie{background:var(--card);border:1px solid var(--line);border-radius:0.8vw;overflow:hidden;}
  .tie .t{display:flex;justify-content:space-between;align-items:center;padding:1.3vh 1.0vw;
    font-size:1.2vw;font-weight:600;}
  .tie .t+.t{border-top:1px solid var(--line);}
  .tie .t.win{color:var(--accent2);font-weight:800;}
  .tie .t .s{font-weight:800;font-variant-numeric:tabular-nums;}
  .tie .t .s .ov{font-weight:600;color:var(--ink2);font-size:0.85em;}
  .tie .t .s .ytb{font-weight:500;color:var(--ink3);font-size:0.85em;font-style:italic;}
  .tie .t.tbd{color:var(--ink3);font-weight:500;}

  /* Butterfly bracket (landscape) */
  .bfly{display:flex;align-items:center;justify-content:center;gap:2.5vw;flex:1 1 auto;
    min-height:0;padding:2vh 2vw;font-size:clamp(9px,1.1vw,21px);}
  .bcolb{display:flex;flex-direction:column;justify-content:center;flex:1 1 0;min-width:0;min-height:0;}
  .bcolb h3{font-size:0.85em;text-transform:uppercase;letter-spacing:0.1em;color:var(--accent);
    font-weight:700;text-align:center;margin-bottom:1vh;flex:0 0 auto;}
  .bfly .tie{font-size:0.95em;width:100%;}
  .bfly .tie .t{padding:0.9vh 0.7em;font-size:0.95em;}
  /* QF pair with bracket connector */
  .pair{position:relative;display:flex;flex-direction:column;gap:26vh;}
  .single{position:relative;display:flex;flex-direction:column;justify-content:center;}
  .brk{position:absolute;top:25%;bottom:25%;width:1.25vw;}
  .brk-l{right:-1.25vw;border:2px solid var(--line);border-left:none;}
  .brk-r{left:-1.25vw;border:2px solid var(--line);border-right:none;}
  .brk-l::after{content:'';position:absolute;top:50%;right:-1.25vw;width:1.25vw;height:2px;background:var(--line);}
  .brk-r::after{content:'';position:absolute;top:50%;left:-1.25vw;width:1.25vw;height:2px;background:var(--line);}
  /* horizontal stub from a match into the column gap */
  .lead{position:absolute;top:50%;height:2px;background:var(--line);}
  .lead-l{right:-2.5vw;width:2.5vw;}
  .lead-r{left:-2.5vw;width:2.5vw;}
  /* centre column: champion floating box ABOVE the final, in the butterfly's void */
  .bcolb.centre{flex:1.25 1 0;justify-content:center;gap:0;position:relative;}
  .champfloat{position:absolute;left:50%;transform:translateX(-50%);bottom:calc(50% + 7vh);width:100%;
    text-align:center;background:var(--card);border:3px solid var(--accent);
    border-radius:0.9vw;padding:2.2vh 1vw;box-shadow:0 0 30px rgba(255,43,191,0.32);}
  .champfloat .lbl{font-size:0.85em;text-transform:uppercase;letter-spacing:0.12em;color:var(--accent);
    font-weight:700;display:block;margin-bottom:0.6vh;}
  .champfloat .nm{font-size:1.8em;font-weight:800;line-height:1.1;}
  .champfloat .nm.tbd{color:var(--ink3);font-weight:500;}
  .bcolb.centre .single .tie{border-color:var(--accent);}

  .updated{position:fixed;bottom:1.4vh;right:1.6vw;font-size:0.85vw;color:var(--ink3);}
  .err{position:fixed;bottom:1.4vh;left:1.6vw;font-size:0.85vw;color:#ff8a8a;}
  .hidden{display:none!important;}
</style>
</head>

<script>
(function(){
  window.goFullscreen = function(){
    var el = document.documentElement;
    if (el.requestFullscreen) el.requestFullscreen();
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  };
  var params = new URLSearchParams(location.search);
  var screen = (params.get('screen') || 'tv').toLowerCase();
  var src = params.get('src') || 'https://beacon-scores.ben-mushen.workers.dev/';
  var refreshMs = parseInt(params.get('refresh') || '20', 10) * 1000;
  var rotateMs = parseInt(params.get('rotate') || '12', 10) * 1000;

  if(screen === 'totem'){ document.body.classList.add('totem'); }

  var main = document.getElementById('main');
  var errEl = document.getElementById('err');
  var updEl = document.getElementById('updated');
  var lastData = null;
  var totemMode = 0;

  function esc(s){ return (s==null?'':String(s)).replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c];}); }
  function fmtScore(sc, ov){ if(!sc) return '<span style="color:var(--ink3);font-size:1.1vw;font-weight:600;">yet to bat</span>'; return esc(sc) + (ov?'<span class="overs">('+esc(ov)+' ov)</span>':''); }

  function setHeader(d){
    document.getElementById('h-title').textContent = d.tournamentName || 'Tournament';
    document.getElementById('h-venue').textContent = d.venue || '';
    var phase = (d.phase||'group');
    var label = phase==='group' ? 'Group stage'
      : phase==='quarter' ? 'Quarter-finals'
      : phase==='semi' ? 'Semi-finals'
      : phase==='final' ? 'Final'
      : phase==='knockout' ? 'Knockout stage' : phase;
    document.getElementById('h-phase').textContent = label;
  }

  function renderCourts(d){
    var courts = d.courts || [];
    var st = d.standings || [];
    var qual = Number(d.qualifiers) || 8;

    var html = '<div class="tvsplit">';

    // LEFT: courts stacked
    html += '<div class="tvcol"><h2>Live on court</h2><div class="courts">';
    courts.forEach(function(c){
      var aStarted = (c.status==='live'||c.status==='done'||c.scoreA||c.scoreB);
      function scoreCell(score,overs,started){
        if(score){ return '<span class="score">'+esc(score)+'</span>'+(overs?'<span class="overs">('+esc(overs)+')</span>':''); }
        if(started){ return '<span class="ytb">yet to bat</span>'; }
        return '';
      }
      html += '<div class="court">';
      html += '<div class="label">Court '+esc(c.court)+'</div>';
      html += '<div class="team-row '+(c.scoreA&&!c.scoreB?'batting':'')+'"><span class="name">'+esc(c.teamA||'TBC')+'</span><span>'+scoreCell(c.scoreA,c.oversA,aStarted)+'</span></div>';
      html += '<div class="vs">v</div>';
      html += '<div class="team-row '+(c.scoreB?'batting':'')+'"><span class="name">'+esc(c.teamB||'TBC')+'</span><span>'+scoreCell(c.scoreB,c.oversB,aStarted)+'</span></div>';
      html += '</div>';
    });
    html += '</div></div>';

    // MIDDLE: fixtures & results (grouped by time slot, auto-scrolling)
    var results = d.results || [];
    html += '<div class="tvcol"><h2>Fixtures &amp; results</h2><div class="fxviewport"><div class="fxscroll" id="fxscroll">';
    if(results.length){
      var lastKey = null;
      var groupName = {A:'Group A', B:'Group B', SF:'Semi-finals', F:'Final'};
      results.forEach(function(m){
        var key = (m.time||'') + '|' + (m.group||'');
        if(key !== lastKey){
          var gp = groupName[m.group] || (m.group||'');
          html += '<div class="fxhdr">'+(m.time?esc(m.time):'')+(gp?' <span class="gp">'+esc(gp)+'</span>':'')+'</div>';
          lastKey = key;
        }
        var played = !!(m.winner);
        var wa = played && m.winner===m.teamA;
        var wb = played && m.winner===m.teamB;
        html += '<div class="fx '+(played?'played':'upcoming')+'">';
        html += '<div class="side left'+(wa?' win':'')+'"><span class="nm">'+esc(m.teamA||'TBC')+'</span>'+(played&&m.scoreA?'<span class="sc">'+esc(m.scoreA)+'</span>':'')+'</div>';
        html += '<div class="vsep">v</div>';
        html += '<div class="side right'+(wb?' win':'')+'"><span class="nm">'+esc(m.teamB||'TBC')+'</span>'+(played&&m.scoreB?'<span class="sc">'+esc(m.scoreB)+'</span>':'')+'</div>';
        html += '</div>';
      });
    }
    html += '</div></div></div>';

    // RIGHT: two stacked group tables
    html += '<div class="tvcol"><h2>Group standings</h2><div class="grouptables">';
    html += groupTable('Group A', d.standingsA || [], 2);
    html += groupTable('Group B', d.standingsB || [], 2);
    html += '</div></div>';

    html += '</div>';
    main.innerHTML = html;
    startFixtureScroll();
  }

  // builds one group's standings table; topN qualify (green)
  function groupTable(label, st, topN){
    var h = '<div class="grouptable"><h3>'+esc(label)+'</h3>'
      + '<table class="ltable"><thead><tr><th class="pos">#</th><th class="team">Team</th>'
      + '<th>P</th><th>W</th><th>L</th><th>Pts</th></tr></thead><tbody>';
    st.forEach(function(s,i){
      h += '<tr class="'+(i<topN?'qual':'')+'">'
        + '<td class="pos">'+(i+1)+'</td>'
        + '<td class="team">'+esc(s.team)+'</td>'
        + '<td>'+esc(s.played)+'</td>'
        + '<td>'+esc(s.won)+'</td>'
        + '<td>'+esc(s.lost)+'</td>'
        + '<td class="pts">'+esc(s.points)+'</td></tr>';
    });
    h += '</tbody></table></div>';
    return h;
  }

  var fxScrollTimer = null;
  function startFixtureScroll(){
    if(fxScrollTimer){ clearInterval(fxScrollTimer); fxScrollTimer = null; }
    var vp = document.querySelector('.fxviewport');
    var sc = document.getElementById('fxscroll');
    if(!vp || !sc) return;
    // wait a tick for layout
    setTimeout(function(){
      var overflow = sc.scrollHeight - vp.clientHeight;
      if(overflow <= 4){ return; } // fits, no scroll needed
      var pos = 0, dir = 1, paused = 0;
      var step = 0.4; // px per tick
      fxScrollTimer = setInterval(function(){
        if(paused > 0){ paused--; return; }
        pos += dir * step;
        if(pos >= overflow){ pos = overflow; dir = -1; paused = 80; } // pause at bottom
        else if(pos <= 0){ pos = 0; dir = 1; paused = 80; }           // pause at top
        sc.style.transform = 'translateY(' + (-pos) + 'px)';
      }, 30);
    }, 100);
  }

  function renderBoard(d){
    function gtable(label, st){
      var h = '<div class="grouptable"><h3>'+esc(label)+'</h3>'
        + '<table class="board"><thead><tr>'
        + '<th class="pos">#</th><th class="team">Team</th><th>P</th><th>W</th><th>L</th><th>Pts</th>'
        + '</tr></thead><tbody>';
      st.forEach(function(s,i){
        h += '<tr class="'+(i<2?'qual':'')+'">'
          + '<td class="pos">'+(i+1)+'</td>'
          + '<td class="team">'+esc(s.team)+'</td>'
          + '<td>'+esc(s.played)+'</td>'
          + '<td>'+esc(s.won)+'</td>'
          + '<td>'+esc(s.lost)+'</td>'
          + '<td class="pts">'+esc(s.points)+'</td></tr>';
      });
      h += '</tbody></table></div>';
      return h;
    }
    var html = '<div class="board-wrap"><div class="grouptables-totem">'
      + gtable('Group A', d.standingsA || [])
      + gtable('Group B', d.standingsB || [])
      + '</div></div>';

    var live = (d.courts||[]).filter(function(c){return c.status==='live' || c.scoreA || c.scoreB;});
    if(live.length){
      html += '<div class="totem-live"><h2>Live now</h2>';
      live.forEach(function(c){
        var sa = c.scoreA||'–', sb = c.scoreB||'–';
        html += '<div class="tl-row"><span class="ct">Court '+esc(c.court)+'</span>'
          + '<span class="mt">'+esc(c.teamA||'TBC')+' v '+esc(c.teamB||'TBC')+'</span>'
          + '<span class="sc">'+esc(sa)+' &nbsp;|&nbsp; '+esc(sb)+'</span></div>';
      });
      html += '</div>';
    }
    main.innerHTML = html;
  }

  function tie(t){
    if(!t || (!t.teamA && !t.teamB)){
      return '<div class="tie"><div class="t tbd">TBC</div><div class="t tbd">TBC</div></div>';
    }
    // build a score display: "98/2 (10)" or "98/2" or "yet to bat" depending on what's filled
    function scoreText(score, overs, otherScore, started){
      if(score){
        return esc(score) + (overs ? ' <span class="ov">('+esc(overs)+')</span>' : '');
      }
      // no score yet for this side
      if(started && otherScore){ return '<span class="ytb">yet to bat</span>'; }
      return '';
    }
    var started = (t.status==='live' || t.status==='done' || t.scoreA || t.scoreB);
    function row(name,scoreHtml,win){
      if(!name) name='TBC';
      var cls = win ? 't win' : (name==='TBC'?'t tbd':'t');
      return '<div class="'+cls+'"><span>'+esc(name)+'</span><span class="s">'+scoreHtml+'</span></div>';
    }
    var wa = t.winner && t.winner===t.teamA;
    var wb = t.winner && t.winner===t.teamB;
    var sa = scoreText(t.scoreA, t.oversA, t.scoreB, started);
    var sb = scoreText(t.scoreB, t.oversB, t.scoreA, started);
    return '<div class="tie">'+row(t.teamA,sa,wa)+row(t.teamB,sb,wb)+'</div>';
  }

  function renderBracket(d){
    var b = d.bracket || {};
    var qf = b.quarterFinals || [], sf = b.semiFinals || [], f = b.final || null;
    var qfL = [qf[0], qf[1]], qfR = [qf[2], qf[3]];
    var sfL = sf[0] || null, sfR = sf[1] || null;
    var champ = f && f.winner ? f.winner : '';

    // 4-team mode: qualifiers of 4 (or fewer), or no quarter-finals filled in -> semis + final only
    var qfFilled = qf.some(function(t){ return t && (t.teamA || t.teamB); });
    var fourTeam = (Number(d.qualifiers) <= 4) || !qfFilled;

    var html = '';
    if(fourTeam){
      // SF (left) | champion + final (centre) | SF (right)
      html += '<div class="bfly fourteam">';
      html += '<div class="bcolb mid"><h3>Semi-final</h3><div class="single">'+tie(sfL)+'<div class="lead lead-l"></div></div></div>';
      html += '<div class="bcolb centre">'
            + '<div class="champfloat"><span class="lbl">Champions</span><span class="nm '+(champ?'':'tbd')+'">'+(champ?esc(champ):'TBC')+'</span></div>'
            + '<h3>Final</h3><div class="single">'+tie(f)+'</div></div>';
      html += '<div class="bcolb mid"><h3>Semi-final</h3><div class="single"><div class="lead lead-r"></div>'+tie(sfR)+'</div></div>';
      html += '</div>';
      main.innerHTML = html;
      return;
    }

    // full 8-team butterfly: QF | SF | (champion above final) | SF | QF
    html += '<div class="bfly">';
    html += '<div class="bcolb side"><h3>Quarter-finals</h3>'
          + '<div class="pair">'+tie(qfL[0])+'<div class="brk brk-l"></div>'+tie(qfL[1])+'</div></div>';
    html += '<div class="bcolb mid"><h3>Semi-final</h3><div class="single">'+tie(sfL)+'<div class="lead lead-l"></div></div></div>';
    html += '<div class="bcolb centre">'
          + '<div class="champfloat"><span class="lbl">Champions</span><span class="nm '+(champ?'':'tbd')+'">'+(champ?esc(champ):'TBC')+'</span></div>'
          + '<h3>Final</h3><div class="single">'+tie(f)+'</div></div>';
    html += '<div class="bcolb mid"><h3>Semi-final</h3><div class="single"><div class="lead lead-r"></div>'+tie(sfR)+'</div></div>';
    html += '<div class="bcolb side"><h3>Quarter-finals</h3>'
          + '<div class="pair">'+tie(qfR[0])+'<div class="brk brk-r"></div>'+tie(qfR[1])+'</div></div>';
    html += '</div>';
    main.innerHTML = html;
  }

  function renderBracketVertical(d){
    var b = d.bracket || {};
    var qf = b.quarterFinals || [], sf = b.semiFinals || [], f = b.final || null;
    var champ = f && f.winner ? f.winner : '';

    // straight connector (final -> champion)
    var straight = '<div class="vconn"></div>';
    // funnel connector: n boxes above converging to fewer below. cols = number of boxes in the WIDER (lower) round
    function funnel(cols){
      // draw `cols` lines converging toward `cols/2` points
      var w = 100, h = 100, mid = w/2;
      var lines = '';
      var pairs = cols/2;
      // positions of the wider round (bottom) box centres
      for(var i=0;i<cols;i++){
        var x = (w/(cols*2)) * (2*i+1);
        // target: centre of the pair it belongs to (top)
        var pair = Math.floor(i/2);
        var tx = (w/(pairs*2)) * (2*pair+1);
        lines += '<line x1="'+x+'" y1="100" x2="'+tx+'" y2="0" stroke="var(--accent)" stroke-width="1.2" opacity="0.5" vector-effect="non-scaling-stroke"/>';
      }
      return '<div class="vfunnel"><svg viewBox="0 0 100 100" preserveAspectRatio="none">'+lines+'</svg></div>';
    }

    var qfFilled = qf.some(function(t){ return t && (t.teamA || t.teamB); });
    var fourTeam = (Number(d.qualifiers) <= 4) || !qfFilled;

    var html = '<div class="vbracket">';
    // Champions
    html += '<div class="vround"><h3>Champions</h3><div class="vrow one"><div class="champcard"><span class="nm '+(champ?'':'tbd')+'">'+(champ?esc(champ):'TBC')+'</span></div></div></div>';
    html += straight;
    // Final
    html += '<div class="vround"><h3>Final</h3><div class="vrow one">'+tie(f)+'</div></div>';
    html += funnel(2);
    // Semi-finals (2 across)
    html += '<div class="vround"><h3>Semi-finals</h3><div class="vrow">'+(sf[0]?tie(sf[0]):tie())+(sf[1]?tie(sf[1]):tie())+'</div></div>';
    if(!fourTeam){
      html += funnel(4);
      // Quarter-finals (4 across)
      html += '<div class="vround"><h3>Quarter-finals</h3><div class="vrow qfrow">'+qf.map(tie).join('')+'</div></div>';
    }
    html += '</div>';
    main.innerHTML = html;
  }

  function render(){
    if(!lastData) return;
    var d = lastData;
    setHeader(d);
    var phase = d.phase || 'group';
    var knockout = (phase==='quarter'||phase==='semi'||phase==='final'||phase==='knockout');

    if(screen==='totem'){
      if(knockout){ renderBracketVertical(d); }
      else { renderBoard(d); }
    } else {
      if(knockout){ renderBracket(d); }
      else { renderCourts(d); }
    }
    if(d.updated){
      var t = new Date(d.updated);
      updEl.textContent = isNaN(t) ? '' : 'Updated '+t.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
    }
  }

  function fetchData(){
    fetch(src + (src.indexOf('?')>-1?'&':'?') + '_t=' + Date.now(), {cache:'no-store'})
      .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
      .then(function(d){ lastData = d; errEl.classList.add('hidden'); render(); })
      .catch(function(e){
        errEl.textContent = 'Waiting for scores… ('+e.message+')';
        errEl.classList.remove('hidden');
      });
  }

  fetchData();
  setInterval(fetchData, refreshMs);

  if(screen==='totem'){
    setInterval(function(){
      if(!lastData) return;
      var phase = lastData.phase || 'group';
      if(phase==='group'){ render(); }
    }, rotateMs);
  }
})();
</script>
